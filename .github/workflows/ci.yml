###############################################################################
# ML Pipeline CI/CD — Santander ML Pipeline
#
# Esteira: Checkout → Setup → Install → Security Gate → Pipeline ML → Tests
#          → Build & Push Container → Deploy Simulation
#
# Shift-Left Security: black, flake8 e bandit rodam ANTES dos testes.
# Container Registry: push automático para GHCR em merges na main.
###############################################################################

name: ML Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissões mínimas necessárias (Princípio do Menor Privilégio)
permissions:
  contents: read
  packages: write # Necessário para push ao GHCR

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: "."
      # Imagem Docker — lowercase obrigatório para GHCR
      IMAGE_NAME: ghcr.io/arthurs357/santander-ml-pipeline/pima-diabetes-api

    steps:
      # =================================================================
      # 1. Setup do Ambiente
      # =================================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url http://internal-pypi/simple --trusted-host internal-pypi -r requirements.txt
          pip install --index-url http://internal-pypi/simple --trusted-host internal-pypi -r requirements-dev.txt

      # =================================================================
      # 2. Shift-Left Security Gate (roda ANTES dos testes)
      # =================================================================
      - name: "🎨 Code Formatting Check (black)"
        run: |
          black --check --diff src/

      - name: "🔍 Linting (flake8)"
        run: |
          # E501: ignora linhas longas (common em strings de log/ML)
          # W503: ignora quebra de linha antes de operador binário (conflita com black)
          # E402: ignora imports não no topo (necessário em alguns módulos com config)
          flake8 src/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --statistics \
            --count

      - name: "🛡️ Security Scan (bandit)"
        run: |
          # -r: recursivo | -ll: apenas severidade MEDIUM+ | -ii: apenas confiança MEDIUM+
          # -x: exclui testes (falsos positivos comuns com assert)
          bandit -r src/ \
            -ll \
            -ii \
            -x src/test_api.py \
            --format txt

      # =================================================================
      # 3. Pipeline ML (Treino + Versionamento via MLflow)
      # =================================================================
      - name: Run Orchestrated Pipeline (CI)
        run: |
          # Executa o orquestrador que gerencia Ingestão -> Preproc -> Treino (DAG)
          python src/pipeline_manager.py

      # =================================================================
      # 4. Testes Automatizados
      # =================================================================
      - name: Run API Tests
        run: |
          pytest src/test_api.py -v

      # =================================================================
      # 5. Build & Push Container (CD — apenas em push na main)
      # =================================================================
      - name: Login to GitHub Container Registry (GHCR)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Push Docker Image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # =================================================================
      # 6. Deploy Simulation (CD)
      # =================================================================
      - name: Deploy Simulation (CD)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "✅ Imagem publicada: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Simulando deploy automático em ambiente de Staging..."
          # kubectl set image deployment/santander-ml-api ml-api=${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "Deploy concluído com sucesso."
