# ===========================================================================
# Prometheus Configuration — Santander ML Pipeline
#
# Consome métricas expostas pelo prometheus-fastapi-instrumentator
# no endpoint /metrics da API FastAPI.
# ===========================================================================

global:
  scrape_interval: 5s        # Coleta a cada 5 segundos (SRE: alta resolução)
  evaluation_interval: 15s   # Avaliação de alertas a cada 15 segundos
  scrape_timeout: 5s         # Timeout de cada scrape

  external_labels:
    project: "santander-ml-pipeline"
    environment: "development"

# ===========================================================================
# Scrape Configs
# ===========================================================================
scrape_configs:

  # -----------------------------------------------------------------------
  # Job: Prometheus Self-Monitoring
  # -----------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "prometheus-server"

  # -----------------------------------------------------------------------
  # Job: FastAPI ML Prediction API
  # Métricas geradas automaticamente pelo prometheus-fastapi-instrumentator:
  #   - http_requests_total
  #   - http_request_duration_seconds (histogram)
  #   - http_request_size_bytes
  #   - http_response_size_bytes
  #   - http_requests_in_progress
  # -----------------------------------------------------------------------
  - job_name: "fastapi_app"
    metrics_path: /metrics
    static_configs:
      - targets:
          # Docker Compose: usa o nome do serviço como hostname
          - "ml-api:8000"
        labels:
          app: "pima-diabetes-api"
          tier: "backend"

    # Fallback para desenvolvimento local (descomente se necessário):
    # static_configs:
    #   - targets: ["host.docker.internal:8000"]
    #     labels:
    #       app: "pima-diabetes-api"
    #       tier: "backend"
