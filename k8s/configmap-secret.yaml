###############################################################################
# ConfigMap & Secret — Santander ML Pipeline
#
# ConfigMap: variáveis NÃO sensíveis (configuração de aplicação).
# Secret:    variáveis SENSÍVEIS (credenciais, connection strings).
#
# Aplicar:
#   kubectl apply -f k8s/configmap-secret.yaml
#
# IMPORTANTE: Em produção, utilize Sealed Secrets, External Secrets Operator
# ou um vault (HashiCorp Vault, AWS Secrets Manager) em vez de Secrets
# versionados em Git.
###############################################################################

---
# =========================================================================
# ConfigMap — Variáveis de configuração não sensíveis
# =========================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: santander-ml-config
  labels:
    app: santander-ml-api
    project: santander-ml-pipeline
data:
  # MLflow Tracking Server
  MLFLOW_TRACKING_URI: "http://mlflow-service:5000"

  # URI do modelo registrado no MLflow Registry
  MODEL_URI: "models:/PimaDiabetes_RandomForest_MedianImputer/latest"

  # Caminho dos dados processados (referência para Data Drift Report)
  PROCESSED_DATA_FILE: "data/processed/pima_diabetes_processed.csv"

  # Caminho do log de inferências (gravado pela API, lido pelo Report)
  INFERENCE_LOG_FILE: "data/logs/inference_logs.csv"

  # Threshold de drift para disparo de alertas (0.0 – 1.0)
  DRIFT_THRESHOLD: "0.5"

---
# =========================================================================
# Secret (Opaque) — Variáveis sensíveis codificadas em Base64
# =========================================================================
# Para gerar o valor em base64:
#   echo -n "postgresql://user:password@db-host:5432/santander_ml" | base64
#
# O valor abaixo é APENAS EXEMPLO (decodifica para:
#   postgresql://santander_user:S3cur3P@ss!@db-prod:5432/ml_pipeline_db)
# =========================================================================
apiVersion: v1
kind: Secret
metadata:
  name: santander-ml-secrets
  labels:
    app: santander-ml-api
    project: santander-ml-pipeline
type: Opaque
data:
  # Base64 de: postgresql://santander_user:S3cur3P@ss!@db-prod:5432/ml_pipeline_db
  DATABASE_URL: cG9zdGdyZXNxbDovL3NhbnRhbmRlcl91c2VyOlMzY3VyM1BAc3MhQGRiLXByb2Q6NTQzMi9tbF9waXBlbGluZV9kYg==
